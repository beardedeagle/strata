name: Nightly Validation

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Cache Cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo fuzz target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            target/cargo-install
            fuzz/target
          key: ${{ runner.os }}-${{ github.job }}-nightly-target-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'fuzz/Cargo.lock', 'fuzz/Cargo.toml', 'Justfile', '.github/workflows/nightly.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-nightly-target-

      - name: Install nightly Rust
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install nightly --profile minimal
          rustup override set nightly

      - name: Install just
        run: |
          rustup toolchain install stable --profile minimal
          cargo +stable install just --version 1.50.0 --locked --target-dir target/cargo-install

      - name: Install cargo-fuzz
        run: just install-fuzz-tools

      - name: Run fuzz gate
        run: just fuzz-ci

  miri:
    name: Miri smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Cache Cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ github.job }}-nightly-target-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'Justfile', '.github/workflows/nightly.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-nightly-target-

      - name: Install Miri
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install nightly --component miri
          rustup override set nightly

      - name: Install just
        run: |
          rustup toolchain install stable --profile minimal
          cargo +stable install just --version 1.50.0 --locked --target-dir target/cargo-install

      - name: Run Miri gate
        run: just miri-ci
